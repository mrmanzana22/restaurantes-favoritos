<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Restaurantes Favoritos</title>
  <style>
    /* CSS Reset */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Variables de color */
    :root {
      --color-primario: #c0392b;
      --color-secundario: #e74c3c;
      --color-acento: #f39c12;
      --color-fondo: #fdf6f0;
      --color-texto: #2c3e50;
      --color-texto-claro: #7f8c8d;
      --color-blanco: #ffffff;
      --sombra: 0 4px 16px rgba(0, 0, 0, 0.12);
      --radio-borde: 12px;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--color-fondo);
      color: var(--color-texto);
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <header>
    <h1>Mis Restaurantes Favoritos</h1>
    <p>Una selección de los mejores lugares para comer en Colombia</p>
  </header>

</body>
</html>
